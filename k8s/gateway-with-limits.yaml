apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: ca2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: gateway:local
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: CHECKOUT_URL
              value: http://checkout:5001/checkout
          
          # NEW: Resource Limits (Security Improvement)
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          
          # Health checks
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 2
            periodSeconds: 5

